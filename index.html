<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山木耳鼻喉科 × 科林助聽器 導引系統</title>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap');

:root {
  --L-bg:       #061c10;
  --L-card:     #0c2e1c;
  --L-card-dim: #071408;
  --L-accent:   #2eee88;
  --L-text:     #d4fce6;
  --L-muted:    #52a872;
  --L-border:   rgba(46,238,136,.18);

  --R-bg:       #1c1000;
  --R-card:     #2e1c00;
  --R-card-dim: #140d00;
  --R-accent:   #ffb820;
  --R-text:     #fff0cc;
  --R-muted:    #a07828;
  --R-border:   rgba(255,184,32,.18);

  --border:  rgba(255,255,255,.07);
  --radius:  10px;
  --gap:     10px;
  --font:    'Noto Sans TC', sans-serif;
  --mono:    'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: #030c06;
  color: #e0ffe8;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════
   LOGIN SCREEN
══════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 40%, #0a2a18 0%, #030c06 60%),
              radial-gradient(ellipse at 70% 60%, #1a0d00 0%, transparent 60%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  gap: 0;
}
#loginScreen.hidden { display: none; }

.login-logo {
  font-size: 48px; margin-bottom: 6px;
}
.login-title {
  font-size: 28px; font-weight: 900; margin-bottom: 4px;
  background: linear-gradient(90deg, var(--L-accent), #a0ffcc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.login-title .rx { color: var(--R-accent); -webkit-text-fill-color: var(--R-accent); background: none; -webkit-background-clip: unset; background-clip: unset; }
.login-subtitle {
  font-size: 15px; color: rgba(255,255,255,.3); margin-bottom: 44px; text-align: center;
}

.login-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px; padding: 36px 44px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  box-shadow: 0 8px 60px rgba(0,0,0,.5);
  min-width: 340px;
}
.login-card h3 {
  font-size: 18px; font-weight: 700; color: rgba(255,255,255,.7);
  margin-bottom: 4px;
}
.login-card p {
  font-size: 13px; color: rgba(255,255,255,.28); text-align: center; line-height: 1.6;
  margin-bottom: 8px;
}

/* Google sign-in button wrapper */
#g_btn_wrapper { display: flex; justify-content: center; }

.login-error {
  font-size: 14px; color: #ff7070;
  background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.2);
  border-radius: 8px; padding: 10px 16px; text-align: center;
  display: none; width: 100%;
}
.login-error.show { display: block; }

/* Permission badge on login card */
.perm-info {
  font-size: 12px; color: rgba(255,255,255,.22); text-align: center;
  border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px; width: 100%;
  line-height: 1.8;
}
.perm-info strong { color: rgba(255,255,255,.45); }

/* ══════════════════════════════
   USER BAR (top-right when logged in)
══════════════════════════════ */
.user-bar {
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.15);
  object-fit: cover;
}
.user-avatar-fallback {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #2eee88, #0ea84e);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #041008; flex-shrink: 0;
}
.user-info { text-align: right; }
.user-name  { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.8); white-space: nowrap; }
.user-role  { font-size: 11px; white-space: nowrap; }
.role-admin  { color: var(--L-accent); }
.role-editor { color: var(--R-accent); }

.btn-logout {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px; padding: 6px 12px; color: rgba(255,255,255,.4);
  font-family: var(--font); font-size: 13px; cursor: pointer; white-space: nowrap;
  transition: all .15s;
}
.btn-logout:hover { background: rgba(255,80,80,.12); border-color: rgba(255,80,80,.3); color: #ff8888; }

/* ══════════════════════════════
   TOPBAR
══════════════════════════════ */
.topbar {
  display: grid;
  grid-template-columns: 1fr 72px 1fr;
  align-items: center;
  flex-shrink: 0;
  min-height: 62px;
  background: linear-gradient(90deg, #0a2414 0%, #050e07 50%, #201200 100%);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.tb-L { display: flex; align-items: center; gap: 12px; padding: 10px 16px; }
.tb-C { display: flex; align-items: center; justify-content: center;
        font-size: 12px; color: rgba(255,255,255,.1); letter-spacing: 1px; }
.tb-R { display: flex; align-items: center; justify-content: flex-end; padding: 10px 16px; gap: 12px; }

.tb-title { font-size: 22px; font-weight: 900; white-space: nowrap; }
.tb-L .tb-title { color: var(--L-accent); }
.tb-R .tb-title { color: var(--R-accent); }

.btn-ss {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--L-accent), #0ea84e);
  border: none; border-radius: 9px; padding: 10px 18px;
  color: #041008; font-family: var(--font); font-size: 16px; font-weight: 900;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 0 18px rgba(46,238,136,.3); transition: all .2s;
}
.btn-ss:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(46,238,136,.55); }
.shortcut-tag {
  font-size: 13px; color: var(--L-muted);
  background: rgba(46,238,136,.08); padding: 4px 9px; border-radius: 5px;
  font-family: var(--mono); white-space: nowrap;
}

/* AI bar removed */

/* ══════════════════════════════
   MAIN LAYOUT
══════════════════════════════ */
.main {
  display: grid;
  grid-template-columns: 1fr 72px 1fr;
  flex: 1; overflow: hidden;
}
.panel { overflow-y: auto; padding: 10px 10px 20px; }
.panel-L { background: var(--L-bg); }
.panel-R { background: var(--R-bg); }

.divider {
  background: linear-gradient(180deg,#0a1a0c,#060906);
  border-left:  1px solid rgba(46,238,136,.08);
  border-right: 1px solid rgba(255,184,32,.08);
  overflow-y: auto;
  display: flex; flex-direction: column; align-items: center;
}
.div-spacer { flex-shrink: 0; }
.div-rows   { display: flex; flex-direction: column; align-items: center; width: 100%; }
.div-row    { display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: var(--gap); }

/* ══════════════════════════════
   PATIENT CARD
══════════════════════════════ */
.pcard {
  border-radius: var(--radius);
  margin-bottom: var(--gap);
  border: 1px solid var(--border);
  position: relative;
  transition: background .3s, border-color .3s, box-shadow .2s;
}
.panel-L .pcard        { background: var(--L-card); border-color: var(--L-border); }
.panel-L .pcard:hover  { box-shadow: 0 0 22px rgba(46,238,136,.14); }
.panel-L .pcard.dimmed { background: var(--L-card-dim); border-color: rgba(46,238,136,.06); }
.panel-L .pcard.dimmed:hover { box-shadow: none; }
.panel-R .pcard        { background: var(--R-card); border-color: var(--R-border); }
.panel-R .pcard:hover  { box-shadow: 0 0 22px rgba(255,184,32,.14); }
.panel-R .pcard.dimmed { background: var(--R-card-dim); border-color: rgba(255,184,32,.06); }
.panel-R .pcard.dimmed:hover { box-shadow: none; }
.pcard.archived { opacity: .35; filter: grayscale(.6); }

.card-main {
  display: flex; align-items: stretch;
  padding: 10px 12px; gap: 10px; min-height: 72px;
}
.card-id-col { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.card-num {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900;
}
.panel-L .card-num { background: var(--L-accent); color: #041008; }
.panel-R .card-num { background: var(--R-accent); color: #150800; }
.dimmed .card-num  { filter: brightness(.38); }

.card-identity { flex-shrink: 0; }
.card-name  { font-size: 20px; font-weight: 900; line-height: 1.15; white-space: nowrap; }
.card-phone { font-size: 14px; font-family: var(--mono); margin-top: 2px; white-space: nowrap; }
.panel-L .card-name  { color: var(--L-text); }
.panel-L .card-phone { color: var(--L-muted); }
.panel-R .card-name  { color: var(--R-text); }
.panel-R .card-phone { color: var(--R-muted); }
.dimmed .card-name  { opacity: .32; }
.dimmed .card-phone { opacity: .25; }

.card-btns {
  flex: 1; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  min-width: 0; align-content: center;
}
.card-btns .obtn,
.card-btns .rbtn { flex: 1 1 auto; min-width: 0; text-align: center; }

.card-actions {
  display: flex; flex-direction: column; align-items: flex-end;
  justify-content: center; gap: 5px; flex-shrink: 0;
}
.sbadge {
  font-size: 13px; padding: 4px 10px; border-radius: 20px;
  font-weight: 700; white-space: nowrap;
}
.sb-w { background: rgba(46,238,136,.12); color: var(--L-accent); border: 1px solid rgba(46,238,136,.28); }
.sb-h { background: rgba(255,184,32,.12);  color: var(--R-accent); border: 1px solid rgba(255,184,32,.28); }
.sb-b { background: rgba(100,190,255,.12); color: #7ac8ff;         border: 1px solid rgba(100,190,255,.28); }
.sb-a { background: rgba(130,130,130,.1);  color: #888;            border: 1px solid rgba(130,130,130,.2); }

.icon-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03);
  color: rgba(255,255,255,.28); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.icon-btn:hover      { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,80,80,.08); }
.icon-btn.arch:hover { border-color: #aaa;    color: #ccc;    background: rgba(180,180,180,.07); }
/* hide delete button for editor role */
.role-editor-hide { display: none !important; }

/* ── LEFT ORDER BUTTONS ── */
.obtn {
  font-size: 15px; padding: 8px 10px; border-radius: 8px;
  border: 1.5px solid rgba(46,238,136,.22); background: rgba(46,238,136,.06);
  color: var(--L-muted); cursor: pointer; transition: all .15s;
  font-family: var(--font); font-weight: 600; white-space: nowrap; line-height: 1;
}
.obtn:hover:not(:disabled) { border-color: var(--L-accent); color: var(--L-accent); background: rgba(46,238,136,.12); }
.obtn.on {
  background: rgba(46,238,136,.24); border-color: var(--L-accent);
  color: var(--L-accent); font-weight: 900; box-shadow: 0 0 10px rgba(46,238,136,.28);
}
.obtn:disabled { opacity: .22; cursor: default; }
.obtn.flow { border-color: rgba(100,190,255,.22); background: rgba(100,190,255,.05); color: rgba(100,190,255,.4); }
.obtn.flow:hover:not(:disabled) { border-color: #6ac4ff; color: #6ac4ff; background: rgba(100,190,255,.13); }
.obtn.flow.on { background: rgba(100,190,255,.22); border-color: #6ac4ff; color: #6ac4ff; font-weight: 900; box-shadow: 0 0 10px rgba(100,190,255,.25); }

/* ── RIGHT STATUS BUTTONS ── */
.rbtn {
  font-size: 15px; padding: 8px 10px; border-radius: 8px;
  border: 1.5px solid rgba(255,184,32,.22); background: rgba(255,184,32,.06);
  color: var(--R-muted); cursor: pointer; transition: all .15s;
  font-family: var(--font); font-weight: 600; white-space: nowrap; line-height: 1;
}
.rbtn:hover:not(:disabled) { border-color: var(--R-accent); color: var(--R-accent); background: rgba(255,184,32,.13); }
.rbtn.on { background: rgba(255,184,32,.24); border-color: var(--R-accent); color: var(--R-accent); font-weight: 900; box-shadow: 0 0 10px rgba(255,184,32,.3); }
.rbtn:disabled { opacity: .2; cursor: default; }

/* 結案X 按鈕 — 紅色系，放在 card-actions 欄位內 */
.rbtn-close {
  font-size: 13px; padding: 4px 10px; border-radius: 7px;
  border: 1.5px solid rgba(255,80,80,.3); background: rgba(255,80,80,.07);
  color: rgba(255,120,120,.7); cursor: pointer; transition: all .15s;
  font-family: var(--font); font-weight: 700; white-space: nowrap;
}
.rbtn-close:hover {
  border-color: #ff5555; color: #ff7070;
  background: rgba(255,80,80,.18);
}

/* ── REMARK ROW ── */
.remark-row { padding: 0 12px 10px; display: none; }
.remark-row.open { display: flex; gap: 6px; align-items: center; }
.remark-area {
  flex: 1; background: rgba(255,255,255,.04);
  border: 1px solid rgba(46,238,136,.16); border-radius: 7px;
  color: var(--L-text); font-family: var(--font);
  font-size: 15px; padding: 6px 12px; resize: none; height: 38px;
  transition: border-color .15s; overflow: hidden;
}
.remark-area:focus { outline: none; border-color: var(--L-accent); }
.remark-area::placeholder { color: var(--L-muted); }

/* ── BRANCH SUB-ROW ── */
.branch-sub { display: none; padding: 4px 12px 10px; gap: 6px; align-items: center; flex-wrap: wrap; }
.branch-sub.open { display: flex; }
.branch-lbl { font-size: 14px; color: var(--R-muted); white-space: nowrap; flex-shrink: 0; }
.branchbtn {
  font-size: 15px; padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid rgba(255,184,32,.2); background: transparent;
  color: var(--R-muted); cursor: pointer; font-family: var(--font);
  font-weight: 600; transition: all .15s; white-space: nowrap;
}
.branchbtn.on { background: rgba(255,184,32,.24); color: var(--R-accent); border-color: var(--R-accent); font-weight: 900; }
.branchbtn:hover { border-color: var(--R-accent); color: var(--R-accent); }

/* ── UPLOAD SUB-ROW ── */
.upload-sub { display: none; padding: 4px 12px 10px; align-items: center; gap: 8px; flex-wrap: wrap; }
.upload-sub.open { display: flex; }
.btn-upload {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,184,32,.14); border: 1.5px solid rgba(255,184,32,.35);
  border-radius: 8px; padding: 8px 16px; color: var(--R-accent);
  font-family: var(--font); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-upload:hover { background: rgba(255,184,32,.24); border-color: var(--R-accent); }
.upload-input { display: none; }
.file-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,184,32,.1); border: 1px solid rgba(255,184,32,.28);
  border-radius: 7px; padding: 6px 12px; color: var(--R-accent);
  font-size: 14px; cursor: pointer; text-decoration: none;
  font-family: var(--font); font-weight: 600; white-space: nowrap; transition: all .15s;
}
.file-chip:hover { background: rgba(255,184,32,.22); border-color: var(--R-accent); }
.file-chip .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--R-text); max-width: 110px; }

.pcard.dragover { border-color: var(--R-accent) !important; background: rgba(255,184,32,.05) !important; }

/* ── NEWLY HANDED GLOW PULSE ── */
@keyframes glowL {
  0%,100% { box-shadow: 0 0 6px rgba(46,238,136,.15); border-color: rgba(46,238,136,.3); }
  50%      { box-shadow: 0 0 40px rgba(46,238,136,.95), 0 0 80px rgba(46,238,136,.4); border-color: rgba(46,238,136,1); }
}
@keyframes glowR {
  0%,100% { box-shadow: 0 0 6px rgba(255,184,32,.15); border-color: rgba(255,184,32,.3); }
  50%      { box-shadow: 0 0 40px rgba(255,184,32,.95), 0 0 80px rgba(255,184,32,.4); border-color: rgba(255,184,32,1); }
}
@keyframes bellSwing {
  0%,100%{ transform: rotate(0deg); }
  15%    { transform: rotate(20deg); }
  30%    { transform: rotate(-18deg); }
  45%    { transform: rotate(13deg); }
  60%    { transform: rotate(-8deg); }
  75%    { transform: rotate(4deg); }
}
.panel-L .pcard.notify { animation: glowL 1.4s ease-in-out infinite; border-width: 2px; }
.panel-R .pcard.notify { animation: glowR 1.4s ease-in-out infinite; border-width: 2px; }
.notify-bell {
  display: inline-block;
  animation: bellSwing 1.4s ease-in-out infinite;
  transform-origin: top center;
  font-size: 18px; margin-left: 5px; vertical-align: middle;
}

/* ── ORDER TAGS on right card ── */
.order-tags-row {
  padding: 0 12px 8px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.order-tag {
  font-size: 14px; padding: 4px 11px; border-radius: 7px;
  background: rgba(255,184,32,.12); color: var(--R-accent);
  border: 1px solid rgba(255,184,32,.28); font-weight: 600; white-space: nowrap;
}

/* ── FILE CHIP WITH DELETE ── */
.file-chip-wrap {
  display: inline-flex; align-items: center; gap: 0;
  background: rgba(255,184,32,.1); border: 1px solid rgba(255,184,32,.28);
  border-radius: 7px; overflow: hidden; transition: all .15s;
}
.file-chip-wrap:hover { border-color: var(--R-accent); background: rgba(255,184,32,.18); }
.file-chip-view {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 10px; color: var(--R-accent);
  font-size: 14px; cursor: pointer; text-decoration: none;
  font-family: var(--font); font-weight: 600; white-space: nowrap;
}
.file-chip-view .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--R-text); max-width: 100px; }
.file-chip-del {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 6px 8px; color: rgba(255,100,100,.5);
  background: transparent; border: none; border-left: 1px solid rgba(255,184,32,.2);
  cursor: pointer; font-size: 13px; transition: all .15s;
}
.file-chip-del:hover { color: #ff6b6b; background: rgba(255,80,80,.12); }

/* ── HANDOFF BTN ── */
.hbtn {
  width: 50px; height: 50px; border-radius: 50%; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 24px; transition: all .22s; flex-shrink: 0; font-family: var(--mono);
}
.hbtn-r { background: rgba(46,238,136,.16); color: var(--L-accent); box-shadow: 0 0 14px rgba(46,238,136,.2); }
.hbtn-r:hover { background: var(--L-accent); color: #041008; transform: scale(1.18); box-shadow: 0 0 26px rgba(46,238,136,.55); }
.hbtn-l { background: rgba(255,184,32,.16); color: var(--R-accent); box-shadow: 0 0 14px rgba(255,184,32,.2); }
.hbtn-l:hover { background: var(--R-accent); color: #150800; transform: scale(1.18); box-shadow: 0 0 26px rgba(255,184,32,.55); }

/* ── ARCHIVE ── */
.arch-section { margin-top: 14px; border-top: 1px dashed rgba(46,238,136,.1); padding-top: 9px; }
.arch-toggle { display: flex; align-items: center; gap: 7px; font-size: 15px; color: var(--L-muted); cursor: pointer; background: none; border: none; padding: 0 0 7px; font-family: var(--font); transition: color .15s; }
.arch-toggle:hover { color: var(--L-text); }
.arch-list { display: none; }
.arch-list.open { display: block; }

/* ══════════════════════════════
   MODALS
══════════════════════════════ */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.87); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.mbox { border-radius: 14px; padding: 24px; width: 360px; max-width: 95vw; }
.mbox.green { background: #0a2016; border: 1px solid rgba(46,238,136,.4); box-shadow: 0 0 50px rgba(46,238,136,.14); }
.mbox.red   { background: #1a0c0c; border: 1px solid #ff5555; box-shadow: 0 0 40px rgba(255,60,60,.12); }
.mbox h4 { font-size: 18px; font-weight: 900; margin-bottom: 12px; }
.mbox.green h4 { color: var(--L-accent); }
.mbox.red   h4 { color: #ff6b6b; }
.mbox p  { font-size: 15px; color: rgba(255,255,255,.45); margin-bottom: 14px; line-height: 1.65; white-space: pre-line; }
.mbox label { font-size: 14px; color: rgba(255,255,255,.4); display: block; margin-bottom: 4px; }

/* ══════════════════════════════════════════════════════
   RWD — 手機版（≤ 700px）
   設計：左右滑動，每欄一個病人，上山木下科林，中間交班
══════════════════════════════════════════════════════ */
@media (max-width: 700px) {
  body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* 隱藏桌面版 */
  .main { display: none !important; }

  /* topbar 精簡 */

    display: flex; align-items: center;
    padding: 0 12px; gap: 10px; min-height: 48px;
    grid-template-columns: unset;
  }
  .tb-L { padding: 0; gap: 8px; }
  .tb-C { display: none; }
  .tb-R { padding: 0; flex: 1; justify-content: flex-end; gap: 8px; }
  .tb-title { font-size: 14px !important; }
  .user-name { display: none; }
  .user-avatar { width: 26px; height: 26px; }
  .btn-logout { font-size: 11px; padding: 5px 9px; }

  /* 手機主容器 */
  #mobileMain {
    display: flex !important;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* 頂部工具列：標題＋新增按鈕 */
  .m-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px; flex-shrink: 0;
    background: rgba(10,26,18,.9);
    border-bottom: 1px solid var(--border);
  }
  .m-topbar-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.5); }
  .m-add-btn {
    display: flex; align-items: center; gap: 5px;
    background: linear-gradient(135deg, var(--L-accent), #0ea84e);
    border: none; border-radius: 8px; padding: 7px 14px;
    color: #041008; font-family: var(--font); font-size: 14px; font-weight: 900;
    cursor: pointer; white-space: nowrap;
  }

  /* 左右滑動軌道 */
  .m-track {
    display: flex; flex-direction: row;
    overflow-x: auto; overflow-y: hidden;
    flex: 1;
    gap: 10px; padding: 8px 10px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .m-track::-webkit-scrollbar { height: 3px; }
  .m-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  /* 每個病人一欄 */
  .m-col {
    display: flex; flex-direction: column;
    flex-shrink: 0;
    width: calc(100vw - 32px);
    scroll-snap-align: start;
    height: 100%;
  }

  /* 上半：山木卡片，固定 45% 高 */
  .m-top {
    background: var(--L-card); border: 1px solid var(--L-border);
    border-radius: var(--radius) var(--radius) 0 0;
    flex: 0 0 45%; overflow-y: auto;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    transition: background .3s, border-color .3s;
  }
  .m-top.dimmed { background: var(--L-card-dim); border-color: rgba(46,238,136,.06); }
  .m-top.notify { animation: glowL 1.4s ease-in-out infinite; border-width: 2px; }

  /* 中間：交班列，固定高度 */
  .m-mid {
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 44px;
    background: linear-gradient(180deg, #0c2018 0%, #180e00 100%);
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }

  /* 下半：科林卡片，固定 45% 高 */
  .m-bot {
    background: var(--R-card); border: 1px solid var(--R-border);
    border-radius: 0 0 var(--radius) var(--radius);
    flex: 0 0 45%; overflow-y: auto;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    transition: background .3s, border-color .3s;
  }
  .m-bot.dimmed { background: var(--R-card-dim); border-color: rgba(255,184,32,.06); }
  .m-bot.notify { animation: glowR 1.4s ease-in-out infinite; border-width: 2px; }

  /* 卡片內：姓名行 */
  .m-header {
    display: flex; align-items: center; gap: 8px;
  }
  .m-num {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900;
  }
  .m-top .m-num { background: var(--L-accent); color: #041008; }
  .m-bot .m-num { background: var(--R-accent); color: #150800; }
  .dimmed .m-num { filter: brightness(.4); }

  .m-identity { flex: 1; min-width: 0; }
  .m-name  { font-size: 17px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .m-phone { font-size: 11px; font-family: var(--mono); margin-top: 1px; }
  .m-top .m-name  { color: var(--L-text); }
  .m-top .m-phone { color: var(--L-muted); }
  .m-bot .m-name  { color: var(--R-text); }
  .m-bot .m-phone { color: var(--R-muted); }
  .dimmed .m-name, .dimmed .m-phone { opacity: .35; }

  .m-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* 卡片內：按鈕群 */
  .m-btns { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .m-btns .obtn        { font-size: 12px !important; padding: 5px 9px !important; }
  .m-btns .rbtn        { font-size: 12px !important; padding: 5px 9px !important; }
  .m-btns .branchbtn   { font-size: 12px !important; padding: 4px 9px !important; }
  .m-btns .order-tag   { font-size: 11px !important; }
  .m-btns .upload-trigger-btn { font-size: 12px !important; padding: 4px 10px !important; }
  .m-btns .file-chip-wrap { flex-shrink: 0; }
  .m-btns .rbtn-close  { font-size: 11px !important; padding: 3px 8px !important; }
  .m-btns .icon-btn    { width: 24px; height: 24px; font-size: 12px; }

  .m-remark {
    width: 100%; background: rgba(255,255,255,.04);
    border: 1px solid rgba(46,238,136,.16); border-radius: 6px;
    color: var(--L-text); font-family: var(--font);
    font-size: 12px; padding: 5px 9px; resize: none; height: 30px; outline: none;
  }

  /* 空狀態欄 */
  .m-empty-col {
    flex-shrink: 0; width: calc(100vw - 32px);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: rgba(255,255,255,.18); font-size: 14px;
  }
  .m-empty-col .ico { font-size: 36px; }

  /* modal 全寬 */
  .mbox { width: 94vw !important; padding: 16px; }
}

}

<script>
/* ══════════════════════════════════════════════════════════
   ⚙️  CONFIGURATION — 管理員請修改這裡
   
   步驟：
   1. 前往 https://console.cloud.google.com/
   2. 建立專案 → APIs & Services → Credentials
   3. 建立 OAuth 2.0 Client ID（Web application）
   4. Authorised JavaScript origins 填入你的網頁網址
      若從本機開啟填：http://localhost  或  file:///
   5. 複製 Client ID 貼到下方 GOOGLE_CLIENT_ID
   6. 在 ALLOWED_USERS 填入可登入的 Google 帳號 email
══════════════════════════════════════════════════════════ */

const GOOGLE_CLIENT_ID = '909507099928-d3tiac50sh1n82u7k5bb2kvmoq6kmodd.apps.googleusercontent.com';
// ↑ 請替換成你的 Google OAuth Client ID

const ALLOWED_USERS = {
  // 管理員（admin）：可新增、編輯、刪除、封存
  admins: [
    'samuel4635@gmail.com',
  ],
  // 編輯人（editor）：可新增、編輯，不可刪除
  // 日後新增編輯員：在下方加一行  ' 新帳號@gmail.com',
  editors: [
    'samuelentclinic@gmail.com',
  ]
};

/* ══════════════════════════════════════════════════════════
   AUTH STATE
   角色規則：
   - ALLOWED_USERS.admins → 'admin'（全權限）
   - ALLOWED_USERS.editors（由管理員在設定頁面動態管理）→ 'editor'
   - 其他 Google 帳號 → 'readonly'（唯讀，不能操作任何按鈕）
══════════════════════════════════════════════════════════ */
let currentUser = null;

// 動態編輯者名單（從 localStorage 讀取，管理員可修改）
function getEditorList() {
  try {
    const saved = JSON.parse(localStorage.getItem('clinic_editors_v7') || 'null');
    if (saved) return saved;
  } catch(e) {}
  // 預設從 ALLOWED_USERS.editors 初始化
  return [...ALLOWED_USERS.editors];
}
function saveEditorList(list) {
  localStorage.setItem('clinic_editors_v7', JSON.stringify(list));
}

function getUserRole(email) {
  if (ALLOWED_USERS.admins.includes(email)) return 'admin';
  if (getEditorList().includes(email))      return 'editor';
  return 'readonly'; // 任何其他 Google 帳號 → 唯讀
}

function isAdmin()    { return currentUser?.role === 'admin'; }
function isEditor()   { return currentUser?.role === 'editor'; }
function isReadonly() { return currentUser?.role === 'readonly'; }
function canDelete()  { return isAdmin(); }
function canEdit()    { return isAdmin() || isEditor(); }

/* ══════════════════════════════════════════════════════════
   GOOGLE SIGN-IN INIT
══════════════════════════════════════════════════════════ */
window.addEventListener('load', function() {
  if (typeof google === 'undefined') {
    showDevBypass();
    return;
  }

  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleLogin,
    auto_select: false,
    cancel_on_tap_outside: false,
  });

  google.accounts.id.renderButton(
    document.getElementById('g_btn_wrapper'),
    {
      theme: 'filled_black',
      size: 'large',
      text: 'signin_with',
      locale: 'zh-TW',
      width: 260,
    }
  );

  google.accounts.id.prompt();
});

function handleGoogleLogin(response) {
  const payload = parseJwt(response.credential);
  const email   = payload.email;
  const role    = getUserRole(email); // 任何帳號都能登入，最低為 readonly

  currentUser = { email, name: payload.name, picture: payload.picture, role };
  loginSuccess();
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}

function loginSuccess() {
  // 記錄此帳號（供管理員在設定頁面看到）
  recordLoginUser(currentUser.email, currentUser.name);

  document.getElementById('loginScreen').classList.add('hidden');
  const app = document.getElementById('appRoot');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';

  renderUserBar();
  applyRoleRestrictions();
  renderAll();
}

function renderUserBar() {
  const bar = document.getElementById('userBar');
  const roleMap = { admin:'管理員', editor:'編輯人', readonly:'唯讀' };
  const clsMap  = { admin:'role-admin', editor:'role-editor', readonly:'role-guest' };
  const roleLbl = roleMap[currentUser.role] || '唯讀';
  const roleCls = clsMap[currentUser.role]  || 'role-guest';

  bar.innerHTML = `
    <div class="user-info">
      <div class="user-name">${currentUser.name}</div>
      <div class="user-role ${roleCls}">${roleLbl}</div>
    </div>
    ${currentUser.picture
      ? `<img class="user-avatar" src="${currentUser.picture}" alt="">`
      : `<div class="user-avatar-fallback">${currentUser.name[0]}</div>`}

// 記錄登入過的帳號（唯讀帳號也存進去，讓管理員看到）
function recordLoginUser(email, name) {
  try {
    const key = 'clinic_seen_users_v7';
    const seen = JSON.parse(localStorage.getItem(key) || '{}');
    if (!seen[email]) seen[email] = { email, name, firstSeen: new Date().toISOString() };
    localStorage.setItem(key, JSON.stringify(seen));
  } catch(e) {}
}

function getSeenUsers() {
  try { return Object.values(JSON.parse(localStorage.getItem('clinic_seen_users_v7') || '{}')); }
  catch(e) { return []; }
}

function openSettings() {
  if (!isAdmin()) return;
  renderSettingsList();
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });

function renderSettingsList() {
  const editors = getEditorList();
  const seen    = getSeenUsers();
  const admins  = ALLOWED_USERS.admins;
  const el      = document.getElementById('settingsList');

  // 合併：已知帳號 + 曾登入的帳號
  const allEmails = [...new Set([
    ...admins,
    ...editors,
    ...seen.map(u => u.email)
  ])];

  if (allEmails.length === 0) {
    el.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:16px">尚無其他帳號記錄</div>';
    return;
  }

  el.innerHTML = allEmails.map(email => {
    const isAdminAcc = admins.includes(email);
    const isEditor   = editors.includes(email);
    const role       = isAdminAcc ? 'admin' : isEditor ? 'editor' : 'readonly';
    const roleLabel  = { admin:'管理員', editor:'編輯人', readonly:'唯讀' }[role];
    const u          = seen.find(x => x.email === email);
    const name       = u?.name || email;

    if (isAdminAcc) {
      // 管理員不可修改
      return `<div class="settings-user-row">
        <div class="su-email" title="${email}">👑 ${name}<br><span style="font-size:11px;opacity:.5">${email}</span></div>
        <span style="font-size:11px;color:rgba(255,100,100,.7);padding:3px 8px;border-radius:4px;background:rgba(255,80,80,.1)">管理員</span>
      </div>`;
    }

    return `<div class="settings-user-row">
      <div class="su-email" title="${email}">${name}<br><span style="font-size:11px;opacity:.5">${email}</span></div>
      <select class="settings-role-select" onchange="changeUserRole('${email}',this.value)">
        <option value="editor" ${role==='editor'?'selected':''}>編輯人</option>
        <option value="readonly" ${role==='readonly'?'selected':''}>唯讀</option>
      </select>
      <button class="su-remove" onclick="removeUserRecord('${email}')" title="從記錄移除">✕</button>
    </div>`;
  }).join('');
}

function changeUserRole(email, newRole) {
  let editors = getEditorList();
  if (newRole === 'editor') {
    if (!editors.includes(email)) editors.push(email);
  } else {
    editors = editors.filter(e => e !== email);
  }
  saveEditorList(editors);
  showToast(`✅ 已將 ${email} 設為${newRole === 'editor' ? '編輯人' : '唯讀'}`);
}

function addEditorManual() {
  const email = document.getElementById('newEditorEmail').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showToast('請輸入有效的 Gmail 地址'); return; }
  const editors = getEditorList();
  if (!editors.includes(email)) { editors.push(email); saveEditorList(editors); }
  // 記錄到 seen users
  const key = 'clinic_seen_users_v7';
  try {
    const seen = JSON.parse(localStorage.getItem(key) || '{}');
    if (!seen[email]) seen[email] = { email, name: email, firstSeen: new Date().toISOString() };
    localStorage.setItem(key, JSON.stringify(seen));
  } catch(e) {}
  document.getElementById('newEditorEmail').value = '';
  renderSettingsList();
  showToast(`✅ 已新增編輯人：${email}`);
}

function removeUserRecord(email) {
  // 從 editors 移除
  let editors = getEditorList().filter(e => e !== email);
  saveEditorList(editors);
  // 從 seen 移除
  try {
    const seen = JSON.parse(localStorage.getItem('clinic_seen_users_v7') || '{}');
    delete seen[email];
    localStorage.setItem('clinic_seen_users_v7', JSON.stringify(seen));
  } catch(e) {}
  renderSettingsList();
  showToast(`🗑 已移除 ${email}`);
}

const SK = 'clinic_v7';

      counter
    }));
  } catch(e) {}

    const d = JSON.parse(localStorage.getItem(SK) || 'null');

        files: (p.files || []).map(f => typeof f === 'string' ? { name: f, data: '' } : { name: f.name || '報告', data: f.data || '' })
      }));
      counter = d.counter || 0;
    }
  } catch(e) {}
}

/* ══ 手機版渲染 ══ */
function renderMobile() {
  const isMobile = window.innerWidth <= 700;
  const mm = document.getElementById('mobileMain');
  if (!mm) return;
  if (!isMobile) { mm.style.display = 'none'; return; }
  mm.style.display = 'flex';

  const active = patients.filter(p => !p.archived);
  const BRANCHES = ['板橋文化','板橋三民','板橋四川','濰樂板橋'];

  function topCard(p) {
    const dimmed = p.handed && !p.returnedToLeft;
    const notifyL = p.notifyLeft === true;
    let badgeCls='sb-w', badgeTxt='等待';
    if (p.returnedToLeft) { badgeCls='sb-b'; badgeTxt='回診'; }
    else if (p.handed)    { badgeCls='sb-h'; badgeTxt='已交班'; }
    const clinBtns = ['PTA','HST','試戴助聽器','試戴CPAP'].map(k => `
      <button class="obtn ${p.orders.includes(k)?'on':''}"
        onclick="toggleOrd('${p.id}','${k}')" ${dimmed?'disabled':''}>${k}</button>`).join('');
    const remarkBtn = `<button class="obtn ${p.orders.includes('備註')?'on':''}"
      onclick="toggleOrd('${p.id}','備註')" ${dimmed?'disabled':''}>📝 備註</button>`;
    const flowBtns = ['收到報告聯絡中','已完成報告解說'].map(k => `
      <button class="obtn flow ${p.orders.includes(k)?'on':''}"
        onclick="toggleOrd('${p.id}','${k}')">${k}</button>`).join('');
    const remarkRow = p.orders.includes('備註') ? `
      <textarea class="m-remark" placeholder="備註…"
        oninput="updateRemark('${p.id}',this.value)"
        ${dimmed?'disabled':''}>${p.remark}</textarea>` : '';
    return `<div class="m-top ${dimmed?'dimmed':''} ${notifyL?'notify':''}" id="mlcard-${p.id}">
      <div class="m-header">
        <div class="m-num">${p.num}</div>
        <div class="m-identity">
          <div class="m-name">${p.name}${notifyL?'&nbsp;🔔':''}</div>
          <div class="m-phone">${p.phone}</div>
        </div>
        <span class="m-badge ${badgeCls}">${badgeTxt}</span>
        <div style="display:flex;gap:3px;margin-left:4px">
          ${!p.handed?`<button class="icon-btn arch" onclick="doArchive('${p.id}')">📦</button>`:''}
          <button class="icon-btn del-only" onclick="askDel('${p.id}')">✕</button>
        </div>
      </div>
      <div class="m-btns">${clinBtns}${remarkBtn}${flowBtns}</div>
      ${remarkRow}
    </div>`;
  }

  function midBtn(p) {
    const goRight = !p.handed || p.returnedToLeft;
    const cls  = goRight ? 'hbtn-r' : 'hbtn-l';
    const icon = goRight ? '⇒' : '⇐';
    const fn   = goRight ? `handRight('${p.id}')` : `handLeft('${p.id}')`;
    return `<div class="m-mid">
      <button class="hbtn ${cls}" onclick="${fn}" style="width:38px;height:38px;font-size:20px">${icon}</button>
    </div>`;
  }

  function botCard(p) {
    if (!p.handed) return `<div class="m-bot dimmed" id="mrcard-${p.id}">
      <div style="color:rgba(255,184,32,.28);font-size:13px;text-align:center;padding:16px 0">尚未交班</div>
    </div>`;
    const dimmed = p.returnedToLeft;
    const notify = p.notifyRight === true;
    const statuses = ['收到待聯絡','已聯絡','完成檢查','上傳報告'];
    const rBtns = statuses.map(s => `
      <button class="rbtn ${p.rightStatus===s?'on':''}"
        onclick="${dimmed?'':(s==='上傳報告'?`triggerUpload('${p.id}')`:`setRS('${p.id}','${s}')`)}
        " ${dimmed?'disabled':''}>${s}</button>`).join('');
    const tagKeys = p.orders.filter(o=>!['備註','收到報告聯絡中','已完成報告解說'].includes(o));
    const tagBtns = tagKeys.map(o=>`<span class="order-tag">${o}</span>`).join('');
    const branchBtns = p.rightStatus==='收到待聯絡'
      ? BRANCHES.map(b=>`<button class="branchbtn ${p.branch===b?'on':''}"
          onclick="${dimmed?'':`setBranch('${p.id}','${b}')`}"
          ${dimmed?'disabled':''}>${b}</button>`).join('')
      : p.branch?`<button class="branchbtn on" style="opacity:.65;cursor:default">${p.branch}</button>`:'';
    const fileChips = p.files.map((f,i)=>`
      <div class="file-chip-wrap">
        <a class="file-chip-view" href="${f.data||'#'}" target="_blank" onclick="viewFile(event,'${p.id}',${i})">
          📄 <span class="fname">${f.name||'報告'+(i+1)}</span></a>
        <button class="file-chip-del" onclick="delFile('${p.id}',${i})">✕</button>
      </div>`).join('');
    const uploadTrigger = p.rightStatus==='上傳報告'?`
      <label class="upload-trigger-btn">📎 上傳
        <input class="upload-input" type="file" id="mupfile-${p.id}" multiple onchange="handleFiles(event,'${p.id}')">
      </label>`:'';
    const infoRow = tagBtns||branchBtns||uploadTrigger||fileChips
      ? `<div class="m-btns">${tagBtns}${branchBtns}${uploadTrigger}${fileChips}</div>` : '';
    return `<div class="m-bot ${dimmed?'dimmed':''} ${notify?'notify':''}" id="mrcard-${p.id}">
      <div class="m-header">
        <div class="m-num">${p.num}</div>
        <div class="m-identity">
          <div class="m-name">${p.name}${notify?'&nbsp;🔔':''}</div>
          <div class="m-phone">${p.phone}</div>
        </div>
        <span class="m-badge sb-h" style="${dimmed?'opacity:.35':''}">${p.rightStatus||'待處理'}</span>
        <button class="rbtn-close del-only" style="margin-left:4px" onclick="askDel('${p.id}')">結案✕</button>
      </div>
      <div class="m-btns">${rBtns}</div>
      ${infoRow}
    </div>`;
  }

  let html = `
    <div class="m-topbar">
      <span class="m-topbar-title">🏥 山木 × 🎧 科林</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${isAdmin() ? `<button class="btn-gear" onclick="openSettings()" style="font-size:15px;padding:5px 8px">⚙️</button>` : ''}
        ${canEdit() ? `<button class="m-add-btn" onclick="openManual()">＋ 新增客戶</button>` : ''}
      </div>
    </div>
    <div class="m-track">`;
  if (active.length === 0) {
    html += `<div class="m-empty-col"><div class="ico">👤</div>按「＋ 新增客戶」開始</div>`;
  } else {
    active.forEach(p => {
      html += `<div class="m-col">${topCard(p)}${midBtn(p)}${botCard(p)}</div>`;
    });
  }
  html += `</div>`;
  mm.innerHTML = html;
}

/* ══════════════════════════════════════════════════════════
   EQUALIZE HEIGHTS + CENTER ALIGNMENT
══════════════════════════════════════════════════════════ */
function equalH() {
  const active = patients.filter(p=>!p.archived);
  active.forEach(p=>{ const lc=document.getElementById('lcard-'+p.id); const rc=document.getElementById('rcard-'+p.id); if(lc)lc.style.minHeight=''; if(rc)rc.style.minHeight=''; });
  active.forEach(p=>{ const lc=document.getElementById('lcard-'+p.id); const rc=document.getElementById('rcard-'+p.id); if(!lc)return; const mH=Math.max(lc.offsetHeight,rc?rc.offsetHeight:0); lc.style.minHeight=mH+'px'; if(rc)rc.style.minHeight=mH+'px'; });
}

function alignCenter() {
  const active = patients.filter(p=>!p.archived);
  const rows = document.getElementById('divRows');
  rows.innerHTML = '';
  active.forEach(p=>{
    const lc=document.getElementById('lcard-'+p.id);
    const h=lc?lc.offsetHeight:72;
    const row=document.createElement('div');
    row.className='div-row'; row.style.height=h+'px'; row.style.marginBottom='var(--gap)';
    const goRight=!p.handed||p.returnedToLeft;
    const cls=goRight?'hbtn-r':'hbtn-l';
    const icon=goRight?'⇒':'⇐';
    const fn=goRight?`handRight('${p.id}')`:`handLeft('${p.id}')`;
    const ttl=goRight?'交班至科林':'導引回山木';
    row.innerHTML=`<button class="hbtn ${cls}" onclick="${fn}" title="${ttl}">${icon}</button>`;
    rows.appendChild(row);
  });
}

/* ══════════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════════ */
function toggleOrd(id, order) {
  if (!canEdit()) return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  const dimmed=p.handed&&!p.returnedToLeft;
  const clinical=['PTA','HST','試戴助聽器','試戴CPAP','備註'];
  if(clinical.includes(order)&&dimmed)return;
  if(p.orders.includes(order)){
    p.orders=p.orders.filter(o=>o!==order);
  } else {
    if(order==='試戴助聽器'||order==='試戴CPAP') p.orders=p.orders.filter(o=>o!=='PTA'&&o!=='HST');
    if(order==='已完成報告解說') p.orders=p.orders.filter(o=>o!=='收到報告聯絡中');
    if(order==='收到報告聯絡中') p.orders=p.orders.filter(o=>o!=='已完成報告解說');
    p.orders.push(order);
  }
  saveAll(); renderLeft();
  requestAnimationFrame(()=>{ equalH(); alignCenter(); });
}

function updateRemark(id,val){ const p=patients.find(x=>x.id===id); if(p){p.remark=val;saveAll();} }

function handRight(id){
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  p.handed=true; p.returnedToLeft=false;
  p.notifyRight=true;   // 右側開始閃爍
  p.notifyLeft=false;   // 左側停止閃爍
  saveAll();renderAll();showToast(`⇒ ${p.name} 已交班至科林`);
  playBell();
}
function handLeft(id){
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  p.returnedToLeft=true;
  p.notifyLeft=true;    // 左側開始閃爍
  p.notifyRight=false;  // 右側停止閃爍
  saveAll();renderAll();showToast(`⇐ ${p.name} 已導引回山木`);
  playBell();
}

function setRS(id, status) {
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  p.rightStatus=(p.rightStatus===status)?null:status;
  saveAll();renderRight();
  requestAnimationFrame(()=>{ equalH();alignCenter(); });
}

// Branch: single-select — clicking same branch deselects
function setBranch(id, branch) {
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  p.branch = (p.branch===branch) ? null : branch;
  saveAll(); renderRight();
  requestAnimationFrame(()=>{ equalH();alignCenter(); });
}

function triggerUpload(id) {
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  p.rightStatus='上傳報告';
  saveAll(); renderRight();
  requestAnimationFrame(()=>{
    equalH(); alignCenter();
    const inp=document.getElementById('upfile-'+id);
    if(inp)inp.click();
  });
}

function handleDrop(e,id){ e.preventDefault(); const c=document.getElementById('rcard-'+id); if(c)c.classList.remove('dragover'); readFiles(Array.from(e.dataTransfer.files),id); }
function handleFiles(e,id){ readFiles(Array.from(e.target.files),id); }
function readFiles(files,id){
  if(!canEdit())return;
  const p=patients.find(x=>x.id===id); if(!p)return;
  files.forEach(file=>{ const r=new FileReader(); r.onload=ev=>{ p.files.push({name:file.name,data:ev.target.result}); saveAll();renderRight(); requestAnimationFrame(()=>{ equalH();alignCenter(); }); }; r.readAsDataURL(file); });
}

/* TOAST + SCROLL */
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

// 在新分頁直接顯示圖片（不下載）
function viewFile(e, id, idx) {
  e.preventDefault();
  const p = patients.find(x=>x.id===id); if(!p||!p.files[idx]) return;
  const f = p.files[idx];
  // open data URL in new tab — browser will render image inline
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>${f.name||'報告'}</title>
    <style>body{margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    img{max-width:100vw;max-height:100vh;object-fit:contain;}</style></head>
    <body><img src="${f.data}" alt="${f.name}"></body></html>`);
  win.document.close();
}

// 刪除已上傳的檔案
function delFile(id, idx) {
  if(!canEdit()) return;
  const p = patients.find(x=>x.id===id); if(!p) return;
  p.files.splice(idx, 1);
  saveAll(); renderRight();
  requestAnimationFrame(()=>{ equalH(); alignCenter(); });
  showToast('🗑 已刪除檔案');
}

// 通知音效（Web Audio API，不需要外部音檔）
let lastNotifyIds = new Set();
function playBell() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 鈴鐺音：兩個正弦波疊加
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
    osc1.frequency.value = 880;
    osc2.frequency.value = 1108;
    osc1.type = 'sine'; osc2.type = 'sine';
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
    osc1.start(); osc2.start();
    osc1.stop(ctx.currentTime + 1.2);
    osc2.stop(ctx.currentTime + 1.2);
  } catch(e) {}
}

// 鈴聲只在按箭頭時響一次，不重複播放（已在 handRight/handLeft 呼叫）

const PL=document.getElementById('panelL'), DC=document.getElementById('divCol'), PR=document.getElementById('panelR');
PL.addEventListener('scroll',()=>{ DC.scrollTop=PL.scrollTop; PR.scrollTop=PL.scrollTop; });
PR.addEventListener('scroll',()=>{ DC.scrollTop=PR.scrollTop; PL.scrollTop=PR.scrollTop; });
window.addEventListener('resize',()=>requestAnimationFrame(()=>{ equalH();alignCenter();renderMobile(); }));
</script>
